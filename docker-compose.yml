services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cleanapi-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: src/CleanApi.API/Dockerfile
    container_name: cleanapi-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=CleanApiDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True
      - Jwt__Key=ThisIsADevelopmentKeyThatShouldBeChangedInProduction123!
      - Jwt__Issuer=CleanApi
      - Jwt__Audience=CleanApi
      - Jwt__TokenExpiryMinutes=15
    depends_on:
      - sqlserver

volumes:
  sqlserver_data:
